[pytest]
testpaths = tests
addopts = --cov=. --cov-report=term-missing --cov-report=html -ra
# Quiet known-benign SQLAlchemy noise (legacy Query.get() and autoflush hints
# from the existing app code) so the test output stays focused on results.
filterwarnings =
    ignore::sqlalchemy.exc.LegacyAPIWarning
    ignore::sqlalchemy.exc.SAWarning
